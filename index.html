    <!-- Canvas fallback favicon (shown only if logo.png fails) -->
    <script>
      (function () {
        var img = new Image();
        img.onerror = function () {
          var c = document.createElement('canvas');
          c.width = 64; c.height = 64;
          var x = c.getContext('2d');
          x.fillStyle = '#0f2347';
          x.beginPath(); x.arc(32, 32, 32, 0, Math.PI * 2); x.fill();
          x.strokeStyle = '#f4a023'; x.lineWidth = 3;
          x.beginPath(); x.arc(32, 32, 29, 0, Math.PI * 2); x.stroke();
          x.fillStyle = '#fff'; x.font = 'bold 18px Arial';
          x.textAlign = 'center'; x.textBaseline = 'middle';
          x.fillText('GNC', 32, 30);
          x.fillStyle = '#f4a023';
          x.beginPath(); x.arc(32, 48, 3, 0, Math.PI * 2); x.fill();
          var l = document.querySelector("link[rel~='icon']");
          if (l) l.href = c.toDataURL('image/png');
        };
        img.src = '/gncollege-website/images/logo.png';
      })();
    </script>

    <!-- ══ Service Worker ══ -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          var hostname = window.location.hostname;
          var isLocalhost = hostname === 'localhost' || hostname === '127.0.0.1';
          var isOwnDomain = hostname.includes('gncollege') || isLocalhost;
          if (!isOwnDomain) return;
          navigator.serviceWorker
            .register('./sw.js')
            .then(function (reg) {
              console.log('[PWA] SW registered:', reg.scope);
              reg.addEventListener('updatefound', function () {
                var nw = reg.installing;
                nw.addEventListener('statechange', function () {
                  if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                    window.location.reload();
                  }
                });
              });
            })
            .catch(function (err) {
              console.warn('[PWA] SW failed:', err);
            });
        });
      }
    </script>
    <!-- ══ End Service Worker ══ -->
