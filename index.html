    <!-- Favicon inline fallback — Navy bg + Gold GNC text (shows if logo.png fails) -->
    <script>
      (function() {
        var canvas = document.createElement('canvas');
        canvas.width = 64; canvas.height = 64;
        var ctx = canvas.getContext('2d');
        // Navy circle background
        ctx.fillStyle = '#0f2347';
        ctx.beginPath();
        ctx.arc(32, 32, 32, 0, Math.PI * 2);
        ctx.fill();
        // Gold border ring
        ctx.strokeStyle = '#f4a023';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(32, 32, 29, 0, Math.PI * 2);
        ctx.stroke();
        // White GNC text
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 18px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('GNC', 32, 30);
        // Gold dot below
        ctx.fillStyle = '#f4a023';
        ctx.beginPath();
        ctx.arc(32, 48, 3, 0, Math.PI * 2);
        ctx.fill();
        // Only use canvas favicon if logo.png fails to load
        var img = new Image();
        img.onerror = function() {
          var link = document.querySelector("link[rel~='icon']");
          if (link) link.href = canvas.toDataURL('image/png');
        };
        img.src = 'public/images/logo.png';
      })();
    </script>

    <!-- ══ Service Worker Registration ══ -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker
                 .register('./sw.js')
            .then(function(reg) {
              console.log('[PWA] Service Worker registered:', reg.scope);
              // New version available — auto reload
              reg.addEventListener('updatefound', function() {
                var newWorker = reg.installing;
                newWorker.addEventListener('statechange', function() {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    console.log('[PWA] New version available — reloading...');
                    window.location.reload();
                  }
                });
              });
            })
            .catch(function(err) {
              console.warn('[PWA] SW registration failed:', err);
            });
        });
      }
    </script>
